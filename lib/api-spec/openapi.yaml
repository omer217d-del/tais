openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: TAIS - Terminal AI System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: automations
    description: Automation rules management
  - name: plugins
    description: Plugin management
  - name: models
    description: AI model management
  - name: logs
    description: System logs
  - name: permissions
    description: Android permissions management
  - name: settings
    description: App settings
  - name: chat
    description: Chat with AI
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /automations:
    get:
      operationId: listAutomations
      tags: [automations]
      summary: List all automations
      parameters:
        - name: enabled
          in: query
          schema:
            type: boolean
        - name: triggerType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of automations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Automation"
    post:
      operationId: createAutomation
      tags: [automations]
      summary: Create a new automation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationInput"
      responses:
        "201":
          description: Created automation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"

  /automations/stats:
    get:
      operationId: getAutomationStats
      tags: [automations]
      summary: Get automation dashboard stats
      responses:
        "200":
          description: Automation statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationStats"

  /automations/{id}:
    get:
      operationId: getAutomation
      tags: [automations]
      summary: Get automation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Automation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAutomation
      tags: [automations]
      summary: Update an automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationUpdate"
      responses:
        "200":
          description: Updated automation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAutomation
      tags: [automations]
      summary: Delete an automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /automations/{id}/toggle:
    patch:
      operationId: toggleAutomation
      tags: [automations]
      summary: Toggle automation enabled/disabled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated automation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"

  /plugins:
    get:
      operationId: listPlugins
      tags: [plugins]
      summary: List all plugins
      responses:
        "200":
          description: List of plugins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plugin"
    post:
      operationId: installPlugin
      tags: [plugins]
      summary: Install a plugin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginInput"
      responses:
        "201":
          description: Installed plugin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plugin"

  /plugins/{id}:
    get:
      operationId: getPlugin
      tags: [plugins]
      summary: Get plugin by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plugin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plugin"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePlugin
      tags: [plugins]
      summary: Delete a plugin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /plugins/{id}/toggle:
    patch:
      operationId: togglePlugin
      tags: [plugins]
      summary: Toggle plugin enabled/disabled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated plugin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plugin"

  /models:
    get:
      operationId: listModels
      tags: [models]
      summary: List all registered models
      responses:
        "200":
          description: List of models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiModel"
    post:
      operationId: registerModel
      tags: [models]
      summary: Register a new AI model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiModelInput"
      responses:
        "201":
          description: Registered model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiModel"

  /models/active:
    get:
      operationId: getActiveModel
      tags: [models]
      summary: Get the currently active model
      responses:
        "200":
          description: Active model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiModel"
        "404":
          description: No active model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /models/supported:
    get:
      operationId: listSupportedModels
      tags: [models]
      summary: List supported GGUF models available for download
      responses:
        "200":
          description: List of supported models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportedModel"

  /models/{id}:
    get:
      operationId: getModel
      tags: [models]
      summary: Get model by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiModel"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteModel
      tags: [models]
      summary: Delete a model record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /models/{id}/activate:
    patch:
      operationId: activateModel
      tags: [models]
      summary: Set model as active
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activated model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiModel"

  /logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List system logs
      parameters:
        - name: level
          in: query
          schema:
            type: string
            enum: [debug, info, warn, error]
        - name: automationId
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogListResponse"
    delete:
      operationId: clearLogs
      tags: [logs]
      summary: Clear all logs
      responses:
        "204":
          description: Cleared

  /logs/stats:
    get:
      operationId: getLogStats
      tags: [logs]
      summary: Get log statistics
      responses:
        "200":
          description: Log statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogStats"

  /permissions:
    get:
      operationId: listPermissions
      tags: [permissions]
      summary: List all Android permissions and their status
      responses:
        "200":
          description: List of permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppPermission"

  /permissions/{id}:
    patch:
      operationId: updatePermission
      tags: [permissions]
      summary: Update permission grant status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PermissionUpdate"
      responses:
        "200":
          description: Updated permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPermission"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get app settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

  /chat/messages:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: Get chat history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to TAIS AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "201":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
    delete:
      operationId: clearChatHistory
      tags: [chat]
      summary: Clear all chat messages
      responses:
        "204":
          description: Cleared

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    TriggerConfig:
      type: object
      properties:
        type:
          type: string
          enum:
            - battery
            - charging
            - time
            - date
            - location
            - bluetooth
            - wifi
            - headset
            - motion
            - shake
            - flip
            - app_open
            - app_close
            - notification
            - nfc
        parameters:
          type: object
          additionalProperties: {}
      required:
        - type

    ActionConfig:
      type: object
      properties:
        type:
          type: string
          enum:
            - notification
            - speak
            - vibrate
            - flashlight
            - open_app
            - close_app
            - volume
            - brightness
            - wifi
            - bluetooth
            - clipboard
            - launch_intent
            - http_request
            - file_operation
        parameters:
          type: object
          additionalProperties: {}
      required:
        - type

    Automation:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        naturalLanguageInput:
          type: string
        trigger:
          $ref: "#/components/schemas/TriggerConfig"
        action:
          $ref: "#/components/schemas/ActionConfig"
        enabled:
          type: boolean
        executionCount:
          type: integer
        lastExecutedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - naturalLanguageInput
        - trigger
        - action
        - enabled
        - executionCount
        - createdAt
        - updatedAt

    AutomationInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        naturalLanguageInput:
          type: string
          minLength: 1
        trigger:
          $ref: "#/components/schemas/TriggerConfig"
        action:
          $ref: "#/components/schemas/ActionConfig"
        enabled:
          type: boolean
      required:
        - name
        - naturalLanguageInput
        - trigger
        - action

    AutomationUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        naturalLanguageInput:
          type: string
        trigger:
          $ref: "#/components/schemas/TriggerConfig"
        action:
          $ref: "#/components/schemas/ActionConfig"
        enabled:
          type: boolean

    AutomationStats:
      type: object
      properties:
        total:
          type: integer
        enabled:
          type: integer
        disabled:
          type: integer
        totalExecutions:
          type: integer
        byTriggerType:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              count:
                type: integer
            required:
              - type
              - count
        recentExecutions:
          type: array
          items:
            $ref: "#/components/schemas/Automation"
      required:
        - total
        - enabled
        - disabled
        - totalExecutions
        - byTriggerType
        - recentExecutions

    PluginManifest:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        author:
          type: string
        permissions:
          type: array
          items:
            type: string
        triggers:
          type: array
          items:
            type: string
        actions:
          type: array
          items:
            type: string
        minAppVersion:
          type: string
        homepage:
          type: ["string", "null"]
      required:
        - id
        - name
        - version
        - description
        - permissions
        - triggers
        - actions

    Plugin:
      type: object
      properties:
        id:
          type: integer
        pluginId:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        author:
          type: ["string", "null"]
        enabled:
          type: boolean
        manifest:
          $ref: "#/components/schemas/PluginManifest"
        installedAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - pluginId
        - name
        - version
        - description
        - enabled
        - manifest
        - installedAt
        - updatedAt

    PluginInput:
      type: object
      properties:
        manifest:
          $ref: "#/components/schemas/PluginManifest"
        enabled:
          type: boolean
      required:
        - manifest

    AiModel:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        provider:
          type: string
          enum: [qwen, gemma, phi, smollm, tinyllama, custom]
        filename:
          type: string
        localPath:
          type: ["string", "null"]
        downloadUrl:
          type: ["string", "null"]
        sizeBytes:
          type: ["integer", "null"]
        quantization:
          type: ["string", "null"]
        contextLength:
          type: ["integer", "null"]
        isActive:
          type: boolean
        status:
          type: string
          enum: [available, downloading, error, missing]
        downloadProgress:
          type: ["integer", "null"]
        installedAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - provider
        - filename
        - isActive
        - status
        - createdAt

    AiModelInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        provider:
          type: string
          enum: [qwen, gemma, phi, smollm, tinyllama, custom]
        filename:
          type: string
          minLength: 1
        localPath:
          type: string
        downloadUrl:
          type: string
        sizeBytes:
          type: integer
        quantization:
          type: string
        contextLength:
          type: integer
      required:
        - name
        - provider
        - filename

    SupportedModel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        description:
          type: string
        downloadUrl:
          type: string
        sizeBytes:
          type: integer
        quantization:
          type: string
        contextLength:
          type: integer
        recommended:
          type: boolean
      required:
        - id
        - name
        - provider
        - description
        - downloadUrl
        - sizeBytes
        - quantization
        - contextLength
        - recommended

    LogEntry:
      type: object
      properties:
        id:
          type: integer
        level:
          type: string
          enum: [debug, info, warn, error]
        message:
          type: string
        source:
          type: ["string", "null"]
        automationId:
          type: ["integer", "null"]
        pluginId:
          type: ["integer", "null"]
        metadata:
          type: ["object", "null"]
          additionalProperties: {}
        timestamp:
          type: string
      required:
        - id
        - level
        - message
        - timestamp

    LogListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    LogStats:
      type: object
      properties:
        total:
          type: integer
        byLevel:
          type: object
          properties:
            debug:
              type: integer
            info:
              type: integer
            warn:
              type: integer
            error:
              type: integer
          required:
            - debug
            - info
            - warn
            - error
        recentErrors:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
      required:
        - total
        - byLevel
        - recentErrors

    AppPermission:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        androidPermission:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [sensor, connectivity, media, system, location, storage]
        granted:
          type: boolean
        required:
          type: boolean
        updatedAt:
          type: string
      required:
        - id
        - name
        - androidPermission
        - description
        - category
        - granted
        - required
        - updatedAt

    PermissionUpdate:
      type: object
      properties:
        granted:
          type: boolean
      required:
        - granted

    AppSettings:
      type: object
      properties:
        id:
          type: integer
        theme:
          type: string
          enum: [light, dark, system]
        language:
          type: string
        developerMode:
          type: boolean
        aiTemperature:
          type: number
        aiMaxTokens:
          type: integer
        aiContextLength:
          type: integer
        foregroundServiceEnabled:
          type: boolean
        batteryOptimizationIgnored:
          type: boolean
        logLevel:
          type: string
          enum: [debug, info, warn, error]
        updatedAt:
          type: string
      required:
        - id
        - theme
        - language
        - developerMode
        - aiTemperature
        - aiMaxTokens
        - aiContextLength
        - foregroundServiceEnabled
        - batteryOptimizationIgnored
        - logLevel
        - updatedAt

    AppSettingsUpdate:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, system]
        language:
          type: string
        developerMode:
          type: boolean
        aiTemperature:
          type: number
        aiMaxTokens:
          type: integer
        aiContextLength:
          type: integer
        foregroundServiceEnabled:
          type: boolean
        batteryOptimizationIgnored:
          type: boolean
        logLevel:
          type: string
          enum: [debug, info, warn, error]

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        automationJson:
          type: ["object", "null"]
          additionalProperties: {}
        processingTimeMs:
          type: ["integer", "null"]
        createdAt:
          type: string
      required:
        - id
        - role
        - content
        - createdAt

    ChatMessageInput:
      type: object
      properties:
        content:
          type: string
          minLength: 1
      required:
        - content

    ChatResponse:
      type: object
      properties:
        userMessage:
          $ref: "#/components/schemas/ChatMessage"
        assistantMessage:
          $ref: "#/components/schemas/ChatMessage"
        parsedAutomation:
          type: ["object", "null"]
          additionalProperties: {}
        automationCreated:
          type: boolean
      required:
        - userMessage
        - assistantMessage
        - automationCreated
